<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mali | Grupal</title>
    <link rel="stylesheet" href="../style/style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2d2d2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../icons/icon-192.svg">
    
</head>
<body>
<div class="g-wrapper">
    <div class="g-header">
        <h1>Mali<span>.</span></h1>
        <p>Colaborá en equipo. Compartí calendarios y tareas.</p>
    </div>

    <div class="g-grid">
        <!-- Card 1: Crear -->
        <div class="g-card">
            <div class="icon">🚀</div>
            <h2>Crear nuevo espacio</h2>
            <p class="sub">Armá un grupo para compartir tareas y eventos con tu equipo.</p>
            <div class="field">
                <label>Nombre del equipo</label>
                <input type="text" id="createName" placeholder="Ej: Proyecto X, Familia, Roomies...">
            </div>
            <button class="btn-primary" id="createBtn">Crear y administrar</button>
            <div id="createMsg" class="msg"></div>
        </div>

        <!-- Card 2: Unirse -->
        <div class="g-card">
            <div class="icon">🔑</div>
            <h2>Tengo una invitación</h2>
            <p class="sub">Ingresá el código de acceso que te compartió el administrador.</p>
            <div class="field">
                <label>Código de acceso</label>
                <input type="text" class="code-input" id="joinCode" placeholder="••••••" maxlength="6" inputmode="text" autocomplete="off">
            </div>
            <button class="btn-outline" id="joinBtn">Unirse al grupo</button>
            <div id="joinMsg" class="msg"></div>
        </div>
    </div>

    <div style="text-align:center;">
        <a href="dashboard.html" class="back-link">← Volver al panel principal</a>
    </div>
</div>

<script type="module" src="../script/grupal-page.js"></script>
    <div class="footer-brand">⚡ CoreTech System</div>
<script src="../script/pwa.js"></script>
</body>
</html>
