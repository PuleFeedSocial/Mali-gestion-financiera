<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mali | Configura tu cuenta</title>
    <link rel="stylesheet" href="../style/style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2d2d2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../icons/icon-192.svg">
    
</head>
<body>
<div class="setup-wrapper">
    <div class="setup-card">
        <div class="logo">Mali<span>.</span></div>
        <h1>Configurá tu cuenta</h1>
        <p class="sub">Personalizá Mali para aprovecharlo al máximo.</p>

        <div id="setupMsg" class="msg"></div>

        <div class="step">
            <div class="num">1</div>
            <span style="font-weight:500;">¿Con qué moneda trabajás?</span>
        </div>
        <div class="field">
            <select id="currency">
                <option value="USD">USD - Dólar estadounidense</option>
                <option value="ARS">ARS - Peso argentino</option>
                <option value="EUR">EUR - Euro</option>
                <option value="BRL">BRL - Real brasileño</option>
                <option value="CLP">CLP - Peso chileno</option>
                <option value="COP">COP - Peso colombiano</option>
                <option value="MXN">MXN - Peso mexicano</option>
                <option value="PEN">PEN - Sol peruano</option>
                <option value="UYU">UYU - Peso uruguayo</option>
                <option value="BOB">BOB - Boliviano</option>
                <option value="PYG">PYG - Guaraní paraguayo</option>
                <option value="GBP">GBP - Libra esterlina</option>
                <option value="CAD">CAD - Dólar canadiense</option>
                <option value="JPY">JPY - Yen japonés</option>
                <option value="CNY">CNY - Yuan chino</option>
            </select>
        </div>

        <div class="step">
            <div class="num">2</div>
            <span style="font-weight:500;">¿Para qué vas a usar Mali?</span>
        </div>
        <div class="field" id="goalsContainer">
            <div class="checkbox-grid">
                <label class="opt" data-value="finanzas">
                    <input type="checkbox" value="finanzas">
                    <span class="check"></span>
                    Gestionar finanzas personales
                </label>
                <label class="opt" data-value="gastos">
                    <input type="checkbox" value="gastos">
                    <span class="check"></span>
                    Controlar gastos diarios
                </label>
                <label class="opt" data-value="ahorros">
                    <input type="checkbox" value="ahorros">
                    <span class="check"></span>
                    Ahorrar para objetivos
                </label>
                <label class="opt" data-value="proyectos">
                    <input type="checkbox" value="proyectos">
                    <span class="check"></span>
                    Organizar proyectos
                </label>
                <label class="opt" data-value="tiempo">
                    <input type="checkbox" value="tiempo">
                    <span class="check"></span>
                    Gestionar mi tiempo
                </label>
                <label class="opt" data-value="negocio">
                    <input type="checkbox" value="negocio">
                    <span class="check"></span>
                    Administrar un negocio
                </label>
                <label class="opt" data-value="otro" style="grid-column:1/-1;">
                    <input type="checkbox" value="otro">
                    <span class="check"></span>
                    Otro
                </label>
            </div>
        </div>

        <button class="btn btn-primary" id="setupBtn" style="width:100%;margin-top:1rem;">Ir al Dashboard</button>

        <p style="text-align:center;color:var(--text-secondary);font-size:0.8rem;margin-top:1rem;">
            Podés cambiar esto después desde Preferencias.
        </p>
    </div>
</div>

<script type="module" src="../script/setup.js"></script>
    <div class="footer-brand">⚡ CoreTech System</div>
<script src="../script/pwa.js"></script>
</body>
</html>
