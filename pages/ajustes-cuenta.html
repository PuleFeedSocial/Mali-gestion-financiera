<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mali | Ajustes de Cuenta</title>
    <link rel="stylesheet" href="../style/style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2d2d2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../icons/icon-192.svg">
    
</head>
<body>
<div class="settings-wrapper">
    <a href="dashboard.html" class="back">← Volver al Dashboard</a>
    <h1>⚙️ Ajustes de Cuenta</h1>
    <p class="sub">Gestioná tu contraseña y datos personales.</p>

    <div id="ajMsg" class="msg"></div>

    <div class="card-settings">
        <h3>🔐 Cambiar contraseña</h3>
        <div class="field">
            <label>Contraseña actual</label>
            <input type="password" id="currentPw" placeholder="••••••••">
        </div>
        <div class="field">
            <label>Nueva contraseña</label>
            <input type="password" id="newPw" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="changePwBtn" style="padding:0.6rem 1.5rem;font-size:0.9rem;">Actualizar contraseña</button>
    </div>

    <div class="card-settings">
        <h3>👤 Datos personales</h3>
        <div class="field">
            <label>Nombre</label>
            <input type="text" id="userName" placeholder="Tu nombre">
        </div>
        <button class="btn btn-primary" id="updateNameBtn" style="padding:0.6rem 1.5rem;font-size:0.9rem;">Guardar cambios</button>
    </div>
</div>

<script type="module" src="../script/ajustes-cuenta.js"></script>
    <div class="footer-brand">⚡ CoreTech System</div>
<button class="pwa-install-btn" id="pwa-install-btn">📲 Instalar Mali</button>
<script src="../script/pwa.js"></script>
</body>
</html>
